<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-spayze — Your Ideal Space Awaits</title>
  <link rel="stylesheet" href="style.css">
  
 
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>


<div class="wrap">

  <!-- LEFT PANEL -->
  <div class="left">
    <img class="left-img"
         src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&q=80"
         alt="Modern building"/>

    <div class="glass-card">
      <div class="logo-icon">
        <img src="/Img/" alt="">
      </div>
      <h2 class="card-title">Find your perfect<br/>space</h2>
      <p class="card-sub">Digitally curating the future of shared<br/>professional environments.</p>
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <a href="index.html" class="logo-icon">
            <img src="/Img/Logo.png" alt="Logo">
          </a>

    <h1 class="welcome-title">Welcome to Co-spayze</h1>
    <p class="welcome-sub">Its been a minute.</p>

    <div class="form-group">
            <div class="form-group">
              <label for="name">Full name</label>
              <input type="text" id="name" placeholder="Enter Name" />
            </div>
            <div class="form-group">
              <label for="email">Email Address </label>
              <input type="email" id="email" placeholder="Enter Email" />
            </div>
          </div>

    <button class="btn-continue" type="button"><a href="">Submit</a></button>
    <p class="sub-btn"><a href="/index.html">Go back</a></p>

    <p class="signup-text">Already have an account? <a href="#" class="signup-link">Sign up</a></p>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Co-spayze – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
   <link rel="stylesheet" href="style.css" />

</head>
<body>

<div class="wrap">
  <!-- LEFT PANEL -->
  <div class="left">
    <img class="left-img"
         src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&q=80"
         alt="Modern building"/>

    <div class="glass-card">
      <div class="icon-circle">
        <svg width="58" height="58" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="28" width="24" height="26" rx="2" fill="#2f6b4a"/>
          <polygon points="18,10 42,28 6,28" fill="#2f6b4a"/>
          <rect x="32" y="20" width="22" height="34" rx="2" fill="#2f6b4a" opacity="0.72"/>
          <rect x="36" y="32" width="6" height="6" rx="1" fill="white"/>
          <rect x="44" y="32" width="6" height="6" rx="1" fill="white"/>
          <rect x="36" y="42" width="6" height="6" rx="1" fill="white"/>
          <rect x="44" y="42" width="6" height="6" rx="1" fill="white"/>
        </svg>
      </div>
      <h2 class="card-title">Find your perfect<br/>space</h2>
      <p class="card-sub">Digitally curating the future of shared<br/>professional environments.</p>
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">

    <div class="logo">
      <svg width="30" height="26" viewBox="0 0 30 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 24 L15 4 L26 24 Z" fill="none" stroke="#2f6b4a" stroke-width="2.2" stroke-linejoin="round"/>
        <rect x="9.5" y="15" width="11" height="9" rx="1.5" fill="none" stroke="#2f6b4a" stroke-width="2"/>
        <circle cx="24" cy="8" r="4.5" fill="#2f6b4a" opacity="0.28"/>
      </svg>
      <span class="logo-text">Co-spayze</span>
    </div>

    <h1 class="welcome-title">Welcome to<br/>Co-spayze</h1>
    <p class="welcome-sub">Its been a minute.</p>

    <div class="form-group">
      <label class="field-label" for="email">Email Address</label>
      <input class="field-input" type="email" id="email" placeholder="Enter your email address"/>
    </div>

    <div class="form-group">
      <label class="field-label" for="password">Password</label>
      <div class="input-wrapper">
        <input class="field-input" type="password" id="password" placeholder="Enter your first name"/>
        <button class="eye-btn" type="button" aria-label="Toggle password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-continue" type="button">Continue</button>

    <p class="signup-text">Already have an account? <a href="#" class="signup-link">Sign up</a></p>

  </div>
</div>

</body>
</html>
